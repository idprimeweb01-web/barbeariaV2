<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarberOS — Área {{ area }}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }

    .ph-wrap {
      text-align: center;
      padding: 40px 20px;
      max-width: 440px;
      width: 100%;
    }

    .ph-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      background: rgba(186,117,23,0.08);
      border: 1.5px solid rgba(186,117,23,0.22);
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .ph-wrap h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .ph-wrap p {
      color: var(--cor-texto-secundario);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .ph-meta {
      font-size: 12px;
      color: #555;
      margin: 20px 0 28px;
    }
    .ph-meta strong { color: #777; }

    .btn-sair {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      background: none;
      border: 1px solid #333;
      border-radius: 8px;
      color: #777;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .15s, color .15s;
    }
    .btn-sair:hover {
      border-color: #dc2626;
      color: #dc2626;
    }
  </style>
</head>
<body>

<div class="ph-wrap">
  <div class="ph-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
         stroke="#BA7517" stroke-width="1.6"
         stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
  </div>

  <h1>Área {{ area }}</h1>
  <p>Esta tela está em construção.</p>
  <p>Em breve você terá acesso completo ao painel.</p>

  <p class="ph-meta">
    Conectado como <strong>{{ nome }}</strong>
    &middot;
    {{ perfil }}
  </p>

  <button class="btn-sair" onclick="sair()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    Sair
  </button>
</div>

<script src="/static/js/bos.js"></script>
<script>
  async function sair() {
    await Bos.logout();
  }
</script>

</body>
</html>
