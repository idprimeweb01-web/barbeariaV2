<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ bk_nome }} — Entrar</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 20px;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: rgba(186,117,23,0.12);
      border: 1.5px solid rgba(186,117,23,0.3);
      border-radius: 16px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .logo-icon img { width: 100%; height: 100%; object-fit: cover; }

    .logo-area h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .form-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 24px;
    }

    .link-cadastro {
      font-size: 13px;
      color: var(--cor-texto-secundario);
      transition: color 0.2s;
    }
    .link-cadastro:hover { color: var(--cor-primaria); }

    #msg-erro { display: none; }
  </style>
</head>
<body>

<div class="login-wrap">

  <div class="logo-area">
    <div class="logo-icon">
      {% if logo_url %}
        <img src="{{ logo_url }}" alt="{{ bk_nome }}">
      {% else %}
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
             stroke="#BA7517" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 4h18"/>
          <path d="M6 4v2a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4"/>
          <path d="M9 12v6"/>
          <path d="M15 12v6"/>
          <path d="M5 20h14"/>
          <circle cx="12" cy="9" r="1"/>
        </svg>
      {% endif %}
    </div>
    <h1>{{ bk_nome }}</h1>
  </div>

  <div class="card">

    <div id="msg-erro" class="alert alert-error" role="alert">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"
           style="flex-shrink:0;margin-top:1px">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="msg-erro-texto"></span>
    </div>

    <form id="form-login" novalidate>

      <div class="field">
        <label for="email">E-mail</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
          <input type="email" id="email" name="email" placeholder="seu@email.com"
                 autocomplete="email" class="has-action" required>
        </div>
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="senha" name="senha" placeholder="••••••••"
                 autocomplete="current-password" class="has-action" required>
          <button type="button" class="input-action" id="toggle-senha" aria-label="Mostrar senha">
            <svg id="icon-olho-aberto" width="18" height="18"
                 viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="icon-olho-fechado" width="18" height="18"
                 viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round"
                 style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-8-10-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-footer">
        <label class="checkbox-wrap">
          <input type="checkbox" id="lembrar" name="lembrar" checked>
          <span>Lembrar-me</span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary" id="btn-entrar">
        <span id="btn-texto">ENTRAR</span>
        <span id="btn-spinner" class="spinner" style="display:none"></span>
      </button>

    </form>
  </div>

  <p class="text-center text-muted mt-24" style="font-size:13px">
    Ainda não tem uma conta?
    <a href="/b/{{ slug }}/cadastro" class="link-cadastro" style="font-weight:600">Cadastre-se</a>
  </p>
</div>

<script>
const _campoSenha  = document.getElementById('senha');
const _toggleSenha = document.getElementById('toggle-senha');
const _iconAberto  = document.getElementById('icon-olho-aberto');
const _iconFechado = document.getElementById('icon-olho-fechado');

_toggleSenha.addEventListener('click', () => {
  const visivel = _campoSenha.type === 'text';
  _campoSenha.type = visivel ? 'password' : 'text';
  _iconAberto.style.display  = visivel ? '' : 'none';
  _iconFechado.style.display = visivel ? 'none' : '';
  _toggleSenha.setAttribute('aria-label', visivel ? 'Mostrar senha' : 'Ocultar senha');
});

function mostrarErro(msg) {
  document.getElementById('msg-erro-texto').textContent = msg;
  const box = document.getElementById('msg-erro');
  box.style.display = 'flex';
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function ocultarErro() {
  document.getElementById('msg-erro').style.display = 'none';
}

function setCarregando(ativo) {
  const btn = document.getElementById('btn-entrar');
  btn.disabled = ativo;
  document.getElementById('btn-texto').style.display   = ativo ? 'none' : '';
  document.getElementById('btn-spinner').style.display = ativo ? '' : 'none';
}

document.getElementById('form-login').addEventListener('submit', async (e) => {
  e.preventDefault();
  ocultarErro();

  const email   = document.getElementById('email').value.trim();
  const senha   = document.getElementById('senha').value;
  const lembrar = document.getElementById('lembrar').checked;

  if (!email) { mostrarErro('Informe o e-mail.'); return; }
  if (!senha)  { mostrarErro('Informe a senha.'); return; }

  setCarregando(true);

  try {
    const resp = await fetch('/b/' + {{ slug | tojson }} + '/entrar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ email, senha, lembrar }),
    });

    const dados = await resp.json();

    if (!resp.ok) {
      mostrarErro(dados.erro || 'Erro ao entrar. Tente novamente.');
      setCarregando(false);
      return;
    }

    window.location.href = dados.redirect;

  } catch {
    mostrarErro('Sem conexão. Verifique sua internet e tente novamente.');
    setCarregando(false);
  }
});
</script>

</body>
</html>
