<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarberOS — Cliente</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100dvh; padding: 24px 20px; }
    .login-wrap { width: 100%; max-width: 420px; }
    .logo-area { text-align: center; margin-bottom: 36px; }
    .logo-area h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .logo-area h1 span { color: var(--cor-primaria); }
    .logo-area p { margin-top: 6px; color: var(--cor-texto-secundario); font-size: 14px; }
    .form-footer { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .link-forgot { font-size: 13px; color: var(--cor-texto-secundario); }
    .link-forgot:hover { color: var(--cor-primaria); }
    .auth-links { text-align: center; margin-top: 18px; font-size: 13px; color: var(--cor-texto-secundario); }
    #msg-erro { display: none; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo-area">
      <h1>Barber<span>OS</span></h1>
      <p>Cliente — Entrar</p>
    </div>

    <div class="card">
      <div id="msg-erro" class="alert alert-error" role="alert">
        <span id="msg-erro-texto"></span>
      </div>

      <form id="form-login" novalidate>
        <div class="field">
          <label for="email">E-mail</label>
          <div class="input-wrap">
            <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required>
          </div>
        </div>

        <div class="field">
          <label for="senha">Senha</label>
          <div class="input-wrap">
            <input type="password" id="senha" name="senha" placeholder="••••••••" autocomplete="current-password" required>
          </div>
        </div>

        <div class="form-footer">
          <label class="checkbox-wrap">
            <input type="checkbox" id="lembrar" name="lembrar">
            <span>Lembrar-me</span>
          </label>
          <a href="#" class="link-forgot" id="linkEsqueci">Esqueceu senha?</a>
        </div>

        <button type="submit" class="btn btn-primary" id="btn-entrar">
          <span id="btn-texto">ENTRAR</span>
          <span id="btn-spinner" class="spinner" style="display:none"></span>
        </button>
      </form>
    </div>

    <p class="auth-links">
      Não tem conta? <a href="/cliente/cadastro" id="linkCadastro">Cadastre-se</a>
    </p>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    (function() {
      const slug = new URLSearchParams(location.search).get('b');
      if (slug) document.getElementById('linkCadastro').href = `/cliente/cadastro?b=${encodeURIComponent(slug)}`;
    })();

    document.getElementById('linkEsqueci').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) { mostrarErro('Informe o e-mail antes de clicar em "Esqueceu senha?".'); return; }
      try {
        await api.post('/auth/esqueci-senha', { email });
        mostrarErro('Se o e-mail existir, a barbearia foi notificada. Aguarde o contato.');
      } catch (err) { mostrarErro(err.message); }
    });

    function mostrarErro(msg) {
      const box = document.getElementById('msg-erro');
      document.getElementById('msg-erro-texto').textContent = msg;
      box.style.display = 'flex';
    }

    function setCarregando(ativo) {
      document.getElementById('btn-entrar').disabled = ativo;
      document.getElementById('btn-texto').style.display = ativo ? 'none' : '';
      document.getElementById('btn-spinner').style.display = ativo ? '' : 'none';
    }

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('msg-erro').style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      if (!email) { mostrarErro('Informe o e-mail.'); return; }
      if (!senha)  { mostrarErro('Informe a senha.'); return; }

      setCarregando(true);
      try {
        const dados = await api.post('/auth/login', { email, senha });
        if (dados.usuario.perfil !== 'cliente') {
          mostrarErro('Esta área é exclusiva para clientes.');
          setCarregando(false);
          return;
        }
        api.setToken(dados.token);
        api.setUser(dados.usuario);
        if (document.getElementById('lembrar').checked) localStorage.setItem('barberos_lembrar', '1');
        window.location.href = '/cliente/dashboard';
      } catch (err) {
        setCarregando(false);
        mostrarErro(err.message || 'Erro ao fazer login.');
      }
    });

    (function() {
      const token = api.getToken(), perfil = api.getPerfil();
      if (token && perfil === 'cliente') window.location.href = '/cliente/dashboard';
    })();
  </script>
</body>
</html>
