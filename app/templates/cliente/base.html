<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>{{ bk_nome }} — {% block title %}{% endblock %}</title>
  <script>
    window.BOS_LOGIN_URL = '/b/{{ bk_slug }}/entrar';
  </script>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { background: #1a1a1a; }

    /* ── Header ────────────────────────────────────────────── */
    .b-header {
      background: #1f1f1f; border-bottom: 1px solid #2d2d2d;
      padding: 0 16px; height: 52px;
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 100;
    }
    .b-brand { font-size: 16px; font-weight: 700; color: #fff; text-decoration: none; flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
    .b-brand-logo { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .b-header-sep { width: 1px; height: 20px; background: #333; flex-shrink: 0; }
    .b-user { flex: 1; font-size: 13px; color: #aaa; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .b-logout {
      background: none; border: none; color: #666; cursor: pointer;
      padding: 6px; border-radius: 6px; transition: color .15s; flex-shrink: 0; display: flex;
    }
    .b-logout:hover { color: #dc2626; }

    /* ── Content ───────────────────────────────────────────── */
    .b-content { max-width: 520px; margin: 0 auto; padding: 16px 16px 84px; }

    /* ── Bottom nav ────────────────────────────────────────── */
    .b-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1f1f1f; border-top: 1px solid #2d2d2d;
      display: flex; z-index: 100;
    }
    .b-nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 9px 2px 7px; color: #555; text-decoration: none;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px;
      border-top: 2px solid transparent; transition: all .15s;
    }
    .b-nav-item.active { color: var(--cor-primaria); border-top-color: var(--cor-primaria); }

    /* ── Card ──────────────────────────────────────────────── */
    .b-card { background: #242424; border: 1px solid #2d2d2d; border-radius: 12px; padding: 18px; margin-bottom: 12px; }

    /* ── Toast ─────────────────────────────────────────────── */
    #toasts {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 8px; z-index: 9999;
      width: calc(100% - 32px); max-width: 400px;
    }
    .toast {
      padding: 12px 16px; border-radius: 10px; font-size: 14px; font-weight: 500;
      text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,.4); animation: tIn .2s ease;
    }
    .toast.t-success { background: #14532d; border: 1px solid #16a34a; color: #bbf7d0; }
    .toast.t-error   { background: #7f1d1d; border: 1px solid #dc2626; color: #fecaca; }
    .toast.t-info    { background: rgba(186,117,23,.15); border: 1px solid #BA7517; color: #fbbf24; }
    @keyframes tIn  { from { transform: translateY(20px); opacity:0; } to { transform: none; opacity:1; } }
    @keyframes tOut { to   { transform: translateY(20px); opacity:0; } }
    .toast.out { animation: tOut .2s ease forwards; }

    .b-loading { text-align: center; color: #444; padding: 32px; font-size: 13px; }
    .b-empty { text-align: center; padding: 48px 20px; color: #555; }
    .b-empty-icon { font-size: 48px; margin-bottom: 12px; }

    {% block styles %}{% endblock %}
  </style>
</head>
<body>
  <header class="b-header">
    <a class="b-brand" href="/cliente/dashboard">
      {% if logo_url %}<img class="b-brand-logo" src="{{ logo_url }}" alt="{{ bk_nome }}">{% endif %}
      {{ bk_nome }}
    </a>
    <div class="b-header-sep"></div>
    <span class="b-user">{{ c_nome }}</span>
    <button class="b-logout" onclick="Bos.logout()" title="Sair">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </header>

  <main class="b-content">
    {% block content %}{% endblock %}
  </main>

  <nav class="b-nav" id="bNav">
    <a class="b-nav-item" href="/cliente/dashboard" data-path="/cliente/dashboard">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Início
    </a>
    <a class="b-nav-item" href="/cliente/agendar" data-path="/cliente/agendar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agendar
    </a>
    <a class="b-nav-item" href="/cliente/beneficios" data-path="/cliente/beneficios">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v10H4V12"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
      Benefícios
    </a>
    <a class="b-nav-item" href="/cliente/historico" data-path="/cliente/historico">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
      Histórico
    </a>
    <a class="b-nav-item" href="/cliente/perfil" data-path="/cliente/perfil">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </a>
  </nav>

  <div id="toasts"></div>

  <script src="/static/js/bos.js"></script>
  <script>
    // ── Nav active state ────────────────────────────────────────
    document.querySelectorAll('.b-nav-item[data-path]').forEach(a => {
      if (window.location.pathname === a.dataset.path) a.classList.add('active');
    });

    // ── Toast ─────────────────────────────────────────────────
    function toast(msg, tipo = 'success') {
      const d = document.createElement('div');
      d.className = `toast t-${tipo}`;
      d.textContent = msg;
      document.getElementById('toasts').appendChild(d);
      setTimeout(() => d.classList.add('out'), 2500);
      setTimeout(() => d.remove(), 2800);
    }

    function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
