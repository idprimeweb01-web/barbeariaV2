<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ bk_nome }} — Cadastro</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 20px;
    }

    .login-wrap { width: 100%; max-width: 420px; }

    .logo-area { text-align: center; margin-bottom: 36px; }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: rgba(186,117,23,0.12);
      border: 1.5px solid rgba(186,117,23,0.3);
      border-radius: 16px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .logo-icon img { width: 100%; height: 100%; object-fit: cover; }

    .logo-area h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }

    #msg-erro { display: none; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo-area">
      <div class="logo-icon">
        {% if logo_url %}
          <img src="{{ logo_url }}" alt="{{ bk_nome }}">
        {% else %}
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none"
               stroke="#BA7517" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 4h18"/>
            <path d="M6 4v2a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4"/>
            <path d="M9 12v6"/>
            <path d="M15 12v6"/>
            <path d="M5 20h14"/>
            <circle cx="12" cy="9" r="1"/>
          </svg>
        {% endif %}
      </div>
      <h1>{{ bk_nome }}</h1>
    </div>

    <div class="card">
      <div id="msg-erro" class="alert alert-error" role="alert">
        <span id="msg-erro-texto"></span>
      </div>

      <form id="form-cadastro" novalidate>
        <div class="field">
          <label for="nome">Nome completo</label>
          <div class="input-wrap">
            <input type="text" id="nome" name="nome" placeholder="Seu nome" autocomplete="name" required>
          </div>
        </div>
        <div class="field">
          <label for="telefone">Telefone (WhatsApp)</label>
          <div class="input-wrap">
            <input type="text" id="telefone" name="telefone" placeholder="(XX) XXXXX-XXXX" autocomplete="tel" required>
          </div>
        </div>
        <div class="field">
          <label for="email">E-mail <span class="text-muted" style="font-weight:400">(opcional)</span></label>
          <div class="input-wrap">
            <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email">
          </div>
        </div>
        <div class="field">
          <label for="senha">Senha</label>
          <div class="input-wrap">
            <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>
          </div>
        </div>
        <div class="field">
          <label for="confirmar">Confirmar senha</label>
          <div class="input-wrap">
            <input type="password" id="confirmar" name="confirmar" placeholder="Repita a senha" autocomplete="new-password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="btn-criar">
          <span id="btn-texto">CRIAR CONTA</span>
          <span id="btn-spinner" class="spinner" style="display:none"></span>
        </button>
      </form>
    </div>

    <p class="text-center text-muted mt-24" style="font-size:13px">
      Já tem uma conta?
      <a href="/b/{{ slug }}/entrar" style="font-weight:600;color:var(--cor-primaria)">Entrar</a>
    </p>
  </div>

  <script>
    function mostrarErro(msg) {
      const box = document.getElementById('msg-erro');
      document.getElementById('msg-erro-texto').textContent = msg;
      box.style.display = 'flex';
      box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
    function ocultarErro() {
      document.getElementById('msg-erro').style.display = 'none';
    }

    function setCarregando(ativo) {
      document.getElementById('btn-criar').disabled = ativo;
      document.getElementById('btn-texto').style.display = ativo ? 'none' : '';
      document.getElementById('btn-spinner').style.display = ativo ? '' : 'none';
    }

    function mascararTelefone(v) {
      v = v.replace(/\D/g, '').slice(0, 11);
      if (v.length > 10) return v.replace(/(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3').trim();
      if (v.length > 5)  return v.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3').trim();
      if (v.length > 2)  return v.replace(/(\d{2})(\d{0,5})/, '($1) $2').trim();
      return v;
    }
    document.getElementById('telefone').addEventListener('input', (e) => {
      e.target.value = mascararTelefone(e.target.value);
    });

    document.getElementById('form-cadastro').addEventListener('submit', async (e) => {
      e.preventDefault();
      ocultarErro();

      const nome      = document.getElementById('nome').value.trim();
      const email     = document.getElementById('email').value.trim();
      const telefone  = document.getElementById('telefone').value.trim();
      const senha     = document.getElementById('senha').value;
      const confirmar = document.getElementById('confirmar').value;

      if (!nome)       { mostrarErro('Informe seu nome.'); return; }
      if (!telefone)   { mostrarErro('Informe seu telefone.'); return; }
      if (!senha || senha.length < 6) { mostrarErro('A senha deve ter no mínimo 6 caracteres.'); return; }
      if (senha !== confirmar) { mostrarErro('As senhas não coincidem.'); return; }

      setCarregando(true);
      try {
        const resp = await fetch('/b/' + {{ slug | tojson }} + '/cadastro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ nome, email, telefone, senha }),
        });
        const dados = await resp.json();
        if (!resp.ok) {
          setCarregando(false);
          mostrarErro(dados.erro || 'Erro ao criar conta.');
          return;
        }
        window.location.href = dados.redirect;
      } catch (err) {
        setCarregando(false);
        mostrarErro('Sem conexão. Verifique sua internet e tente novamente.');
      }
    });
  </script>
</body>
</html>
