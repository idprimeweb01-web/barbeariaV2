{% extends "super/base.html" %}
{% block title %}Auditoria{% endblock %}
{% block page_title %}Auditoria e Logs{% endblock %}

{% block styles %}
<style>
.aud-toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 20px; }
.aud-input { padding: 8px 12px; background: #181818; border: 1.5px solid #2a2a2a; border-radius: 8px; color: #fff; font-family: inherit; font-size: 13px; outline: none; }
.aud-input:focus { border-color: var(--cor-primaria); }
.btn-carregar { padding: 8px 18px; background: var(--cor-primaria); border: none; color: #fff; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-exportar { padding: 8px 18px; background: none; border: 1.5px solid var(--cor-primaria); color: var(--cor-primaria); border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
.aud-pag { display: flex; justify-content: center; gap: 10px; margin-top: 16px; align-items: center; font-size: 13px; color: #888; }
.aud-pag button { background: none; border: 1px solid #2a2a2a; color: #ccc; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-family: inherit; }
.aud-pag button:disabled { opacity: .4; cursor: not-allowed; }
</style>
{% endblock %}

{% block content %}
<div class="aud-toolbar">
  <select class="aud-input" id="fTipo" onchange="paginaAtual=1;carregar()">
    <option value="">Todas as ações</option>
    <option value="create">Criação</option>
    <option value="edicao">Edição</option>
    <option value="delete">Exclusão</option>
    <option value="login">Login</option>
    <option value="notificacao">Notificação</option>
  </select>
  <button class="btn-carregar" onclick="paginaAtual=1;carregar()">Atualizar</button>
</div>

<div class="table-wrap">
  <table class="data-table">
    <thead>
      <tr><th>Data/Hora</th><th>Usuário</th><th>Barbearia</th><th>Ação</th></tr>
    </thead>
    <tbody id="logsTbody">
      <tr><td colspan="4" style="text-align:center;color:#555;padding:24px">Carregando…</td></tr>
    </tbody>
  </table>
</div>

<div class="aud-pag" id="paginacao" style="display:none">
  <button id="btnAnterior" onclick="irPagina(-1)">&lt; Anterior</button>
  <span id="paginaLabel">Página 1 de 1</span>
  <button id="btnProxima" onclick="irPagina(1)">Próxima &gt;</button>
</div>
{% endblock %}

{% block scripts %}
<script>
let paginaAtual  = 1;
let totalPaginas = 1;

async function carregar() {
  const params = new URLSearchParams({ page: paginaAtual, per_page: 50 });
  const tipo = document.getElementById('fTipo').value;
  if (tipo) params.append('tipo_acao', tipo);

  try {
    const r = await Bos.get('/super/auditoria?' + params);
    totalPaginas = r.pages;
    renderizar(r.registros);
    document.getElementById('paginaLabel').textContent = `Página ${r.page} de ${r.pages}`;
    document.getElementById('btnAnterior').disabled = r.page <= 1;
    document.getElementById('btnProxima').disabled  = r.page >= r.pages;
    document.getElementById('paginacao').style.display = r.total > 0 ? 'flex' : 'none';
  } catch(e) {
    document.getElementById('logsTbody').innerHTML =
      `<tr><td colspan="4" style="text-align:center;color:#f87171;padding:24px">Erro: ${esc(e.message)}</td></tr>`;
  }
}

function renderizar(logs) {
  const tbody = document.getElementById('logsTbody');
  if (!logs.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#555;padding:24px">Nenhum registro encontrado.</td></tr>';
    return;
  }
  tbody.innerHTML = logs.map(l => `
    <tr>
      <td style="color:#888;white-space:nowrap">${esc(l.criado_em || '—')}</td>
      <td style="color:#ddd">${esc(l.usuario || '—')}</td>
      <td style="color:#aaa">${esc(l.barbearia || '—')}</td>
      <td>${esc(l.tipo_acao)} — ${esc(l.entidade)} — ${esc(l.descricao)}</td>
    </tr>
  `).join('');
}

function irPagina(delta) {
  const nova = paginaAtual + delta;
  if (nova < 1 || nova > totalPaginas) return;
  paginaAtual = nova;
  carregar();
}

carregar();
</script>
{% endblock %}
