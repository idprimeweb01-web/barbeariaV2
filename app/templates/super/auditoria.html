{% extends "super/base.html" %}
{% block title %}Auditoria{% endblock %}
{% block page_title %}Auditoria e Logs{% endblock %}

{% block styles %}
<style>
.aud-toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 20px; }
.aud-input { padding: 8px 12px; background: #181818; border: 1.5px solid #2a2a2a; border-radius: 8px; color: #fff; font-family: inherit; font-size: 13px; outline: none; }
.aud-input:focus { border-color: var(--cor-primaria); }
.btn-carregar { padding: 8px 18px; background: var(--cor-primaria); border: none; color: #fff; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-exportar { padding: 8px 18px; background: none; border: 1.5px solid var(--cor-primaria); color: var(--cor-primaria); border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
.aud-pag { display: flex; justify-content: center; gap: 10px; margin-top: 16px; align-items: center; font-size: 13px; color: #888; }
.aud-pag button { background: none; border: 1px solid #2a2a2a; color: #ccc; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-family: inherit; }
.aud-pag button:disabled { opacity: .4; cursor: not-allowed; }
</style>
{% endblock %}

{% block content %}
<div class="aud-toolbar">
  <input class="aud-input" id="fFiltro" placeholder="Buscar por usuário ou ação...">
  <select class="aud-input" id="fDias">
    <option value="7">Últimos 7 dias</option>
    <option value="30" selected>Últimos 30 dias</option>
    <option value="90">Últimos 90 dias</option>
  </select>
  <button class="btn-carregar" onclick="paginaAtual = 1; carregar()">Buscar</button>
  <button class="btn-exportar" onclick="exportarCsv()">Exportar (CSV)</button>
</div>

<div class="table-wrap">
  <table class="data-table">
    <thead>
      <tr><th>Data/Hora</th><th>Usuário</th><th>Ação</th></tr>
    </thead>
    <tbody id="logsTbody">
      <tr><td colspan="3" style="text-align:center;color:#555;">Carregando…</td></tr>
    </tbody>
  </table>
</div>

<div class="aud-pag" id="paginacao" style="display:none">
  <button id="btnAnterior" onclick="irPagina(-1)">&lt; Anterior</button>
  <span id="paginaLabel">Página 1 de 1</span>
  <button id="btnProxima" onclick="irPagina(1)">Próxima &gt;</button>
</div>
{% endblock %}

{% block scripts %}
<script>
let paginaAtual = 1;
let totalPaginas = 1;

async function carregar() {
  const filtro = document.getElementById('fFiltro').value.trim();
  const dias = document.getElementById('fDias').value;
  try {
    const r = await api.super.auditoria.logs(paginaAtual, filtro, dias);
    totalPaginas = r.total_paginas;
    renderizar(r.logs);
    document.getElementById('paginaLabel').textContent = `Página ${r.pagina} de ${r.total_paginas}`;
    document.getElementById('btnAnterior').disabled = r.pagina <= 1;
    document.getElementById('btnProxima').disabled = r.pagina >= r.total_paginas;
    document.getElementById('paginacao').style.display = r.total > 0 ? 'flex' : 'none';
  } catch (e) {
    document.getElementById('logsTbody').innerHTML = `<tr><td colspan="3" style="text-align:center;color:#f87171;">Erro: ${e.message}</td></tr>`;
  }
}

function renderizar(logs) {
  const tbody = document.getElementById('logsTbody');
  if (!logs.length) {
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#555;">Nenhum registro encontrado.</td></tr>';
    return;
  }
  tbody.innerHTML = logs.map(l => `
    <tr>
      <td>${new Date(l.data_hora).toLocaleString('pt-BR')}</td>
      <td>${l.usuario_nome}${l.barbearia_nome ? ' — ' + l.barbearia_nome : ''}</td>
      <td>${l.acao}</td>
    </tr>
  `).join('');
}

function irPagina(delta) {
  const nova = paginaAtual + delta;
  if (nova < 1 || nova > totalPaginas) return;
  paginaAtual = nova;
  carregar();
}

async function exportarCsv() {
  const filtro = document.getElementById('fFiltro').value.trim();
  const dias = document.getElementById('fDias').value;
  try {
    const blob = await api.super.auditoria.exportar(filtro, dias);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'auditoria.csv';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  } catch (e) { toast(e.message, 'error'); }
}

carregar();
</script>
{% endblock %}
