{% extends "super/base.html" %}
{% block title %}{{ secao }}{% endblock %}
{% block page_title %}{{ secao }}{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:50vh">
  <div style="text-align:center;max-width:340px">
    <div style="display:inline-flex;align-items:center;justify-content:center;
                width:64px;height:64px;border-radius:16px;
                background:rgba(186,117,23,.08);border:1.5px solid rgba(186,117,23,.2);
                margin-bottom:20px">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
           stroke="#BA7517" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
    <p style="font-size:17px;font-weight:700;color:#666;margin-bottom:8px">Em construção</p>
    <p style="font-size:13px;color:#444;line-height:1.6">
      A seção <strong style="color:#666">{{ secao }}</strong> estará disponível em breve.
    </p>
    <a href="/super/dashboard" style="display:inline-flex;align-items:center;gap:6px;
       margin-top:24px;font-size:13px;color:var(--cor-primaria)">
      ← Voltar ao Dashboard
    </a>
  </div>
</div>
{% endblock %}

{% block scripts %}{% endblock %}
