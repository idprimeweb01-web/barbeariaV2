{% extends "super/base.html" %}
{% block title %}Gestores{% endblock %}
{% block page_title %}Gestores{% endblock %}

{% block content %}
<div class="section-header" style="margin-bottom:16px">
  <span class="section-title">Gestores</span>
  <input id="fBusca" type="text" placeholder="Buscar por nome ou e-mail…" oninput="renderTabela()"
    style="background:#1e1e1e;border:1px solid #333;color:#ccc;padding:9px 14px;border-radius:8px;font-size:13px;font-family:inherit;width:240px">
</div>

<div class="table-wrap">
  <table class="data-table">
    <thead><tr><th>Nome</th><th>E-mail</th><th>Telefone</th><th>Barbearia</th><th>Status</th></tr></thead>
    <tbody id="tbody"><tr><td colspan="5" style="text-align:center;color:#444;padding:32px">Carregando…</td></tr></tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script>
let _todos = [];

async function carregar() {
  try {
    _todos = await Bos.get('/super/gestores');
    renderTabela();
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="5" style="text-align:center;color:#f87171;padding:32px">${esc(e.message)}</td></tr>`;
  }
}

function renderTabela() {
  const busca   = (document.getElementById('fBusca')?.value || '').toLowerCase();
  const tb      = document.getElementById('tbody');
  const lista   = _todos.filter(g =>
    !busca || g.nome?.toLowerCase().includes(busca) || g.email?.toLowerCase().includes(busca)
  );
  if (!lista.length) {
    tb.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#444;padding:32px">Nenhum gestor encontrado.</td></tr>';
    return;
  }
  tb.innerHTML = lista.map(g => `
    <tr>
      <td style="font-weight:600;color:#ddd">${esc(g.nome)}</td>
      <td style="color:#aaa">${esc(g.email || '—')}</td>
      <td style="color:#aaa">${esc(g.telefone || '—')}</td>
      <td style="color:#aaa">
        ${g.bk_slug
          ? `<a href="/b/${esc(g.bk_slug)}" target="_blank" style="color:var(--cor-primaria);text-decoration:none">${esc(g.barbearia || '—')}</a>`
          : esc(g.barbearia || '—')}
      </td>
      <td>
        <span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;
          ${g.ativo ? 'background:rgba(34,197,94,.12);color:#4ade80' : 'background:rgba(239,68,68,.12);color:#f87171'}">
          ${g.ativo ? 'Ativo' : 'Inativo'}
        </span>
      </td>
    </tr>`).join('');
}

carregar();
</script>
{% endblock %}
